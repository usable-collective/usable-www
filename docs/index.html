<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Usable</title>
	<link
		href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
		rel="stylesheet"
		integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
		crossorigin="anonymous"
	>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
	<style>
		:root {
			--page-bg: #8E00FD;
			--curtain-image: url('./assets/img/curtain.png');
		}

		html,
		body {
			height: 100%;
            color: #fff;
		}

        a {
            color: #fff;
            text-decoration: underline;
        }

		body {
			margin: 0;
            font-size: 2rem;
            font-weight: 600;
			background-color: var(--page-bg);
			font-family: 'Inter', sans-serif;
		}

		.hero-stage {
			min-height: 100vh;
			position: relative;
			overflow: hidden;
		}

		.hero-logo {
			width: min(70vw, 300px);
			height: auto;
			display: block;
		}

		.hero {
			display: flex;
			flex-direction: column;
			align-items: center;
			text-align: center;
		}

		.hero a {
			font-family: 'Poppins', sans-serif;
            text-decoration: none;
		}

		.curtain-overlay {
			position: absolute;
			inset: 0;
			width: 100%;
			height: 100%;
			background-image: var(--curtain-image);
			background-position: center center;
			background-repeat: no-repeat;
			background-size: cover;
			pointer-events: none;
			z-index: 2;
            text-align: center;
		}
	</style>
</head>
<body>
	<main class="hero-stage d-flex align-items-center justify-content-center">
		<div class="hero">
            <img
                src="./assets/img/logo-u-white-transparent.png"
                alt="Usable logo"
                class="hero-logo mb-4"
		    >
            <a href="mailto:hello@gousable.com">hello@gousable.com</a>
        </div>
		<div
			id="curtain-overlay"
			class="curtain-overlay"
			aria-hidden="true"
		></div>
	</main>
</body>
</html>
